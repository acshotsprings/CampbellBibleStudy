name: Twice Daily Site Backup

on:
  schedule:
    # Runs at 11:00 and 23:00 UTC (6am and 6pm Central Time)
    - cron: '0 11,23 * * *'
  workflow_dispatch:  # Allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create backup zip
        run: |
          mkdir -p backups
          STAMP=$(date -u +"%Y-%m-%d-%H%M")
          ZIPNAME="backups/site-${STAMP}.zip"
          # Zip everything EXCEPT the resources/ folder, the backups/ folder
          # itself (no recursion), and the .git folder
          zip -r "$ZIPNAME" . \
            -x "resources/*" \
            -x "backups/*" \
            -x ".git/*" \
            -x ".github/*"
          echo "Created: $ZIPNAME"
          ls -lh "$ZIPNAME"

      - name: Commit and push backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "Automated backup $(date -u +'%Y-%m-%d %H:%M UTC')" && git push)
